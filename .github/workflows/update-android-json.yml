name: Update Android Static JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout static repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate android update JSON
        run: node scripts/generate-android-update.mjs

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/app-update/android.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update Android app update JSON"
          git push
