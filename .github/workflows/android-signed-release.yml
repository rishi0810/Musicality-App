name: Android Signed Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk

      - name: Commit and push static manifest
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          mkdir -p static
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import os

          gradle_path = pathlib.Path("app/build.gradle.kts")
          manifest_path = pathlib.Path("static/manifest.json")
          gradle = gradle_path.read_text(encoding="utf-8")

          vc_match = re.search(r"versionCode\s*=\s*(\d+)", gradle)
          if not vc_match:
              raise SystemExit("Could not find versionCode in app/build.gradle.kts")
          version_code = int(vc_match.group(1))

          tag_name = os.environ["TAG_NAME"].strip()
          if not tag_name.startswith("v"):
              raise SystemExit(f"Tag '{tag_name}' must start with 'v'")

          data = {
              "latestVersionCode": version_code,
              "latestVersionName": tag_name,
              "apkUrl": f"https://github.com/rishi0810/Musicality-App/releases/download/{tag_name}/app-release.apk"
          }
          manifest_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
          if git diff --quiet -- static/manifest.json; then
            echo "manifest unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/manifest.json
          git commit -m "chore(update): refresh static manifest for ${{ github.ref_name }}"
          git push origin HEAD:"$DEFAULT_BRANCH"

      - name: Wait for manifest commit to propagate
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Waiting 60 seconds for GitHub/jsDelivr propagation..."
          sleep 60
          echo "Done waiting"

      - name: Purge jsDelivr cache for update manifest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: gacts/purge-jsdelivr-cache@v1
        with:
          url: |
            https://cdn.jsdelivr.net/gh/rishi0810/Musicality-App@latest/static/manifest.json
            https://cdn.jsdelivr.net/gh/rishi0810/Musicality-App@main/static/manifest.json
